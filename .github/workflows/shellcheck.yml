name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck -x
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version
      - name: Lint
        run: |
          set -e
          shopt -s nullglob
          files=( install.sh phases/*.sh flows/*.sh lib/*.sh )
          printf 'Linting %d file(s):\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"
          shellcheck -x "${files[@]}"
